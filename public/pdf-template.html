<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-color: #4F8EF7;
        --secondary-color: #58C27D;
        --accent-color: #F6C445;
        --coral-color: #F26B6B;
        --bg-color: #FFFDF7;
        --surface-color: #FFFFFF;
        
        --text-main: #2c3e50;
        --text-muted: #5e6d7c;
        --border-color: #e2e8f0;
        --input-bg: #f8fafc;
        
        --radius-md: 10px;
        --radius-lg: 16px;
        --radius-xl: 24px;
        
        --font-family: 'Nunito', sans-serif;
      }

      @page {
        size: A4;
        margin: 2.5cm;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: var(--font-family);
        color: var(--text-main);
        background-color: var(--surface-color);
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .page-content {
        padding: 0; /* Padding is now handled by @page margin */
      }

      .atividade {
        font-size: 1.25rem;
        line-height: 1.8;
        color: #1a202c;
      }

      .atividade h1 {
        color: var(--primary-color);
        font-size: 2.2rem;
        font-weight: 800;
        margin-top: 1rem;
        margin-bottom: 1.5rem;
        text-align: center;
        border-bottom: 3px double #e1e9fb;
        padding-bottom: 1rem;
        page-break-after: avoid;
        break-after: avoid;
      }

      .atividade h2 {
        color: var(--secondary-color);
        font-size: 1.6rem;
        font-weight: 800;
        margin-top: 2rem;
        margin-bottom: 1rem;
        page-break-after: avoid;
        break-after: avoid;
      }

      .atividade h3 {
        color: var(--text-main);
        font-size: 1.3rem;
        font-weight: 700;
        margin-top: 1.5rem;
        margin-bottom: 0.5rem;
        page-break-after: avoid;
        break-after: avoid;
      }

      .atividade p {
        margin-bottom: 1.25rem;
        text-align: justify;
        orphans: 3;
        widows: 3;
      }

      .atividade ul,
      .atividade ol {
        margin-left: 2rem;
        margin-bottom: 1.5rem;
        orphans: 3;
        widows: 3;
      }

      .atividade li {
        margin-bottom: 0.5rem;
        padding-left: 0.5rem;
      }

      .atividade li::marker {
        color: var(--primary-color);
        font-weight: bold;
      }

      .atividade strong {
        font-weight: 800;
        color: #0f172a;
        background-color: rgba(246, 196, 69, 0.2);
        padding: 0 0.2rem;
        border-radius: 4px;
      }

      .atividade table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin: 2rem 0;
        background-color: #fff;
        border-radius: var(--radius-md);
        overflow: hidden;
        border: 2px solid #e1e9fb;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .atividade th,
      .atividade td {
        padding: 1rem;
        text-align: left;
      }

      .atividade th {
        background-color: #f1f5fe;
        font-weight: 800;
        color: var(--primary-color);
        border-bottom: 2px solid #e1e9fb;
      }

      .atividade td {
        border-bottom: 1px solid var(--border-color);
      }

      .atividade tr:last-child td {
        border-bottom: none;
      }

      .atividade tr:nth-child(even) td {
        background-color: #fafbfc;
      }

      .atividade pre {
        background-color: #f1f5f9;
        color: #334155;
        padding: 1.5rem;
        border-radius: var(--radius-md);
        border-left: 4px solid var(--accent-color);
        overflow-x: auto;
        margin: 1.5rem 0;
        font-family: monospace;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .footer {
        margin-top: 50px;
        text-align: center;
        color: #777;
        font-size: 11px;
      }

      h1 + p,
      h2 + p,
      h3 + p {
        page-break-before: avoid;
        break-before: avoid;
      }

      section {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    </style>
  </head>

  <body>
    <div class="page-content">
      <div class="atividade">
        <div id="conteudo"></div>
      </div>
      
      <div class="footer">
        Gerado por AtivAI
      </div>
    </div>
  </body>
</html>
