<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <style>
      @page {
        size: A4;
        margin: 2cm;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        color: #333;
        font-size: 14px;
        line-height: 1.6;
      }

      h1 {
        color: #1e3a8a;
        font-size: 28px;
        border-bottom: 2px solid #ddd;
        padding-bottom: 10px;
        margin-top: 0;

        page-break-after: avoid;
        break-after: avoid;
      }

      h2 {
        color: #2563eb;
        margin-top: 28px;
        margin-bottom: 12px;

        page-break-after: avoid;
        break-after: avoid;
      }

      h3,
      h4,
      h5,
      h6 {
        page-break-after: avoid;
        break-after: avoid;
      }

      p {
        margin: 10px 0;
        text-align: justify;
      }

      ul,
      ol {
        margin: 10px 0 20px 24px;

        page-break-inside: avoid;
        break-inside: avoid;
      }

      li {
        margin-bottom: 6px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;

        page-break-inside: avoid;
        break-inside: avoid;
      }

      thead {
        display: table-header-group;
      }

      tr {
        page-break-inside: avoid;
        break-inside: avoid;
      }

      table,
      th,
      td {
        border: 1px solid #bbb;
      }

      th {
        background: #f3f4f6;
        font-weight: bold;
      }

      th,
      td {
        padding: 8px;
        vertical-align: top;
      }

      pre {
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: inherit;
      }

      hr {
        border: none;
        border-top: 1px solid #ccc;
        margin: 30px 0;
      }

      blockquote {
        margin-left: 20px;
        padding-left: 15px;
        border-left: 4px solid #ccc;
      }

      img {
        max-width: 100%;
      }

      .footer {
        margin-top: 50px;
        text-align: center;
        color: #777;
        font-size: 11px;
      }


      h1 + p,
      h2 + p,
      h3 + p {
        page-break-before: avoid;
      }

      p,
      table,
      ul,
      ol {
        orphans: 3;
        widows: 3;
      }

      section {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    </style>
  </head>

  <body>
    <div id="conteudo"></div>

    <div class="footer">
      Gerado por AtivAI
    </div>
  </body>
</html>
